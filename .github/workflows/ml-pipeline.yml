name: ML Pipeline

on:
  push:
    paths:
      - "dataset/train.csv"
      - "dataset/metadata.json"
      - "train.py"
      - "app.py"
      - "config.json"
      - "Dockerfile"
      - "requirements.txt"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-build-run:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch data from GitHub
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: python train.py

      - name: Build Docker image
        run: docker build -t ml-fastapi-app .

      - name: Run Docker container
        run: |
          docker run -d -p 8000:8000 --name ml-api ml-fastapi-app
          sleep 10

      - name: Check metrics API
        run: curl --fail http://localhost:8000/metrics

      - name: Commit updated model and metrics
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add model.pkl metrics.json
          git commit -m "Update model and metrics" || echo "No changes to commit"
          git push
